name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Supersede stale runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Runners are pinned to ubuntu-26.04 (NOT `ubuntu-latest`): a floating image is a
# silent explosion waiting for GitHub's next bump. 26.04 is the newest LTS — if it
# breaks it's a clean upstream bug report, which is the point. Bump by hand.
jobs:
  # ── Job 1: hydrate + cleanse the dependency layer ──────────────────────────────────────────────
  # Absorb ALL the dependency-build noise HERE, off in its own job, so the build job below is clean.
  #   • mathlib comes from `lake exe cache get` (downloaded oleans carry no per-module log → silent).
  #   • Foundation is a git dependency with NO public olean cache, so it compiles from source (~135
  #     modules) and emits ~200 lint/deprecation warnings that are upstream's, not ours. We build it
  #     once here, then CLEAR its cached build logs so they don't `Replayed`-spam the build job (and
  #     the blueprint gate) with warnings we can't fix and don't want to read.
  # The built+cleansed Foundation is handed to the build job via a manifest-keyed cache (only ~226M —
  # we deliberately do NOT cache mathlib's ~6GB of oleans, since `cache get` re-hydrates those fast).
  # Bonus: keyed on toolchain+manifest, so Foundation only recompiles when its pinned rev bumps —
  # lint-only / proof-only commits reuse it and skip the ~1600-job Foundation build entirely.
  deps:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v4
      # Probe the Foundation cache FIRST. On a hit this job's product already exists, so every step
      # below is skipped and the post-job save re-affirms the existing entry — no wasted mathlib
      # `cache get` or Foundation build. Only on a MISS do we run lean-action and build from source.
      - name: Cache Foundation build (keyed on toolchain + manifest)
        id: foundation-cache
        uses: actions/cache@v4
        with:
          path: .lake/packages/Foundation/.lake/build
          key: foundation-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}
      # elan + `lake exe cache get` only (build: false); we drive `lake build Foundation` ourselves.
      # Skip lean-action's own whole-.lake GitHub cache (use-github-cache: false) — we manage a
      # tighter, Foundation-only cache above instead of shuttling the full 8GB tree.
      - uses: leanprover/lean-action@v1
        if: steps.foundation-cache.outputs.cache-hit != 'true'
        with:
          build: false
          use-github-cache: false
      - name: Build Foundation from source (cache miss only)
        if: steps.foundation-cache.outputs.cache-hit != 'true'
        run: lake build Foundation
      # ── Clear Foundation's cached warnings ───────────────────────────────────────────────────────
      # Modern Lake stores each module's build diagnostics in its `.trace` file's `"log"` array and
      # RE-EMITS them (`⚠ Replayed`) on every downstream build. Emptying `"log"` drops the replay
      # WITHOUT touching the `.olean` (verified: no recompile, diagnostics vanish, build still green).
      # This only silences replayed *text* — it cannot change what the axiom/blueprint gates verify,
      # which read the oleans. Runs on a cache miss only: a hit's saved cache is already cleared.
      - name: Clear Foundation's replayed-warning cache
        if: steps.foundation-cache.outputs.cache-hit != 'true'
        run: |
          python3 - <<'PY'
          import json, pathlib
          root = pathlib.Path('.lake/packages/Foundation/.lake/build')
          cleared = 0
          for t in root.rglob('*.trace'):
              try:
                  d = json.loads(t.read_text())
              except (ValueError, OSError):
                  continue
              if d.get('log'):
                  d['log'] = []
                  t.write_text(json.dumps(d))
                  cleared += 1
          print(f'cleared warning cache in {cleared} Foundation trace(s)')
          PY

  # Build GoodsteinPA against the cleansed dependency layer from `deps`, run the shake gate on the
  # freshly built oleans, and generate the import graph — all sharing the one build.
  build:
    name: Build
    needs: deps
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
        with:
          build: false
          use-github-cache: false
      # Restore the Foundation build cleansed by `deps` (guaranteed present via `needs: deps`).
      - name: Restore Foundation build (warnings cleared)
        uses: actions/cache/restore@v4
        with:
          path: .lake/packages/Foundation/.lake/build
          key: foundation-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}
          fail-on-cache-miss: true
      - name: Build GoodsteinPA
        run: lake build

      # Axiom-clean gate: `#guard_msgs`-pinned axiom sets for the headline theorems (silent == clean).
      # - name: Axiom-clean gate (guarded #print axioms)
      #   run: lake env lean scripts/AxiomCheck.lean

      # Blueprint status gate: reconcile each `@[goodstein_blueprint]` claim against its real footprint.
      # - name: Blueprint status gate (collectAxioms vs claim)
      #   run: |
      #     set -euo pipefail
      #     lake build GoodsteinPABlueprint blueprint_audit
      #     lake exe blueprint_audit blueprint/trusted-axioms.txt

      - uses: extractions/setup-just@v3

      # shake reads the just-built oleans to find unused imports, so it must run after `lake build`.
      - name: Check shake applied (no unused imports)
        run: |
          just shake
          if [ -n "$(git diff)" ]; then
            echo "Unused imports found. Please run 'just shake' and commit the changes."
            exit 1
          fi

      - uses: ts-graphviz/setup-graphviz@v2
      - name: Generate import graph
        run: just import-graph

      - name: Upload lean artifacts
        uses: actions/upload-artifact@v7
        with:
          name: lean-artifacts
          path: |
            import_graph.png
            import_graph.pdf
            import_graph.html
          retention-days: 1
          include-hidden-files: true

  check-references:
    name: Check references.bib format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: extractions/setup-just@v3
      - name: Install bibtool
        run: |
          sudo apt-get update
          sudo apt-get install -y bibtool
      - name: Check references.bib is formatted
        run: |
          just references
          if [ -n "$(git diff)" ]; then
            echo "references.bib is not formatted. Please run 'just references' and commit the changes."
            exit 1
          fi

  # mk_all only scans the source tree (no build), so it runs as its own lightweight job.
  mk-all-check:
    name: Check mk_all executed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: extractions/setup-just@v3
      - uses: leanprover/lean-action@v1
        with:
          build: false
          use-github-cache: false
      - name: Check mk_all executed
        run: |
          just mk-all
          if [ -n "$(git diff)" ]; then
            echo "Files were modified by mk_all. Please run 'just mk-all' and commit the changes."
            exit 1
          fi

  deploy:
    name: Generate page
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs:
      - build
      - check-references
      - mk-all-check
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download lean artifacts
        uses: actions/download-artifact@v8
        with:
          name: lean-artifacts
      - name: Copy from artifacts to pages
        run: |
          mkdir -p pages
          cp "$GITHUB_WORKSPACE/import_graph.png" \
             "$GITHUB_WORKSPACE/import_graph.pdf" \
             "$GITHUB_WORKSPACE/import_graph.html" \
             pages/

      - uses: actions/upload-pages-artifact@v5
        with:
          path: pages
      - uses: actions/deploy-pages@v5
        id: deployment
